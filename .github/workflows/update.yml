name: Daily Bursary Update

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run update script
        run: npm install && npm run update

      - name: Copy bursaries into site
        run: |
          mkdir -p public
          cp bursaries.json public/bursaries.json

      - name: Commit changes
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "bot@github.com"
          git add bursaries.json
          git diff --cached --quiet || git commit -m "auto update"
          git push

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
